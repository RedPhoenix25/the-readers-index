<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="The Reader's Index — A curated literary sanctuary. Discover books, read reviews, and join a community of passionate readers on a journey toward building a physical library." />
    <meta name="keywords" content="books, reading, book reviews, library, bookshelf, recommendations, bookish community" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>The Reader's Index — A Literary Sanctuary</title>
  </head>
  <body>
    <script>
      // Clear any lingering Service Workers from the Rail Fence app on this port
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
            console.log("Lingering Service Worker unregistered");
          }
        });
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
